# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Supabase → TrailBase Migration Configuration                              ║
# ║                                                                             ║
# ║  This project has migrated from Supabase to TrailBase.                      ║
# ║  This file is retained for reference; active services now use TrailBase.    ║
# ║                                                                             ║
# ║  TrailBase replaces:                                                        ║
# ║    - PostgreSQL → SQLite (built-in)                                         ║
# ║    - GoTrue Auth → Built-in auth                                            ║
# ║    - PostgREST → Built-in REST API                                          ║
# ║    - Realtime → Built-in subscriptions                                      ║
# ║    - Storage → Built-in file management                                     ║
# ║    - Studio/admin → Built-in admin UI at /_/admin/                          ║
# ║                                                                             ║
# ║  Usage:                                                                     ║
# ║    ./bin/trail-bin run         (start server)                              ║
# ║    http://localhost:4000       (server URL)                                ║
# ║    http://localhost:4000/_/admin/  (admin UI)                             ║
# ║    http://localhost:4000/_/auth/login (auth UI)                           ║
# ║                                                                             ║
# ║  Key files:                                                                 ║
# ║    traildepot/config.textproto     (TrailBase config)                      ║
# ║    traildepot/data/main.db         (SQLite database)                       ║
# ║    traildepot/migrations/main/     (SQL migrations)                        ║
# ║    traildepot/secrets/keys/        (Ed25519 JWT keys)                      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

project_id = "bapx-local"

# ─── Legacy Supabase (DISABLED — replaced by TrailBase) ──────────────────────
# These services are disabled because TrailBase provides equivalent
# functionality natively. Keep configurations for reference.

[api]
enabled = false
schemas = ["public", "bapx"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
enabled = false
major_version = 17

[db.pooler]
enabled = false

[auth]
enabled = false
site_url = "http://localhost:3000"

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = false

[storage]
enabled = false

[edge_runtime]
enabled = false

[studio]
enabled = false

[inbucket]
enabled = false

[analytics]
enabled = false

# ─── TrailBase Service Mapping ────────────────────────────────────────────────
# TrailBase serves all backend functionality on port 4000.
#
# Port   Service              Supabase Equivalent
# ─────  ───────────────────  ───────────────────────────────
# 4000   TrailBase server     (replaces postgres:54322, gotrue:54321,
#                              postgrest, realtime, storage, studio:54323)
# 3000   Next.js frontend     (unchanged)
# 8008   Bapx API (Hono)      (custom API layer)
#
# TrailBase JWT signing uses Ed25519 keys at:
#   traildepot/secrets/keys/private_key.pem
#   traildepot/secrets/keys/public_key.pem
#
# Database location:
#   traildepot/data/main.db
#
# Auth tables:
#   _user       (user accounts, password hashes, verification status)
#   _session    (refresh token sessions)
#
# Application tables (STRICT SQLite):
#   accounts, account_members, platform_user_roles
#   sandboxes, sandbox_members, sandbox_invites, sandbox_integrations
#   api_keys, integrations, deployments
#   billing_customers, credit_accounts, credit_ledger, credit_purchases, credit_usage
#   platform_settings, access_allowlist, access_requests, account_deletion_requests
#   oauth_clients, oauth_access_tokens, oauth_authorization_codes, oauth_refresh_tokens
#   pool_resources, pool_sandboxes, server_entries
#   tunnel_connections, tunnel_permissions, tunnel_permission_requests, tunnel_audit_logs
